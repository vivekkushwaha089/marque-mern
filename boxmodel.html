<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <link rel="stylesheet" href="style.css">
    <style>
        *{
    margin:auto;
    padding:auto;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    padding:15px;
}

.container{
    width:100%;
}

/* Heading */
.title-box{
    background:salmon;
    border:5px solid black;
    padding:35px;
    margin-bottom:25px;
}

.title-box h1{
    font-size:45px;
}


.info-box{
    background:lightblue;
    border:8px solid navy;
    padding:18px;
    margin-bottom:20px;
    font-size:24px;
}

/* List */
.list{
    margin:20px;
    font-size:28px;
}

.list li{
    background:yellow;
    color:purple;
    margin:12px 0;
    padding:8px;
}

h2{
    font-size:45px;
    margin:30px 0 20px;
}

/* Background  */
.background-box{
    background:lightblue;
    border:8px solid navy;
    padding:18px;
    display:flex;
    align-items:center;
    gap:20px;
}

.small-box{
    width:120px;
    height:80px;
    border:4px solid black;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.background-box p{
    font-size:24px;
}
    </style>
</head>
<body>

    <div class="container">

        <div class="title-box">
            <h1>Box Model</h1>
        </div>

        <div class="info-box">
            Every element on the page has its own box, which can be styled using CSS.
        </div>

        <div class="info-box">
            From the inside out:
        </div>

        <ul class="list">
            <li>content</li>
            <li>padding</li>
            <li>border</li>
            <li>margin</li>
        </ul>

        <h2>Background</h2>

        <div class="background-box">
            <div class="small-box">
                background
            </div>

            <p>
                Keep in mind that a background will cover the content and the padding.
            </p>
        </div>

    </div>

</body>
</html>
