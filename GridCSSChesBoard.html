<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid-CSS</title>\
    <style>


        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }        
     #container1{
    display: grid;
    grid-template-columns: repeat(4, 120px);
    grid-template-rows: repeat(4, 120px);
    justify-content: center;
    margin-top: 50px;
    width: fit-content;
    border: none;
    border: 2px solid black;

}

.grid-items{
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;

}
.white{
    background-color: black;
}
.black{
    background-color: white;
}

    </style>
</head>
<body>
    <div id="container1">
        <div class="grid-items white"></div>
        <div class="grid-items black"></div>
        <div class="grid-items white"></div>
        <div class="grid-items black"></div>
        <div class="grid-items black"></div>
        <div class="grid-items white"></div>
        <div class="grid-items black"></div>
        <div class="grid-items white"></div>
        <div class="grid-items white"></div>
        <div class="grid-items black"></div>
        <div class="grid-items white"></div>
        <div class="grid-items black"></div>
        <div class="grid-items black"></div>
        <div class="grid-items white"></div>
        <div class="grid-items black"></div>
        <div class="grid-items white"></div>
    </div>
</body>
</html>
