<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td,
        th {
            border: 0.5px solid;
        }
        table {
            border-collapse: collapse;
        }
        thead {
            background-color: yellowgreen;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>

        </colgroup>
        <thead>

                <th>EmpID</th>
                <th>EmpName</th>
                <th>Emp Job Title</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>911</td>
                <td>Zoya Shaikh</td>
                <td>Developer</td>
                <td>3.6</td>
            </tr>
            <tr>
                <td>811</td>
                <td>Lisha Dev</td>
                <td>Tester</td>
                <td rowspan="2">3.6</td>
            </tr>
            <tr>
                <td>711</td>
                <td>Vivek</td>
                <td>Editer</td>
                <td>3.6</td>
            </tr>
            <tr>
                <td>611</td>
                <td>Aditya</td>
                <td>Software Engineer</td>
                <td>5.6</td>
            </tr>
            <caption>I am making a table</caption>
        </tbody>
        <tfoot>
                <tr>
                    <col style="background-color: aqua;">
                    <td>this is footer</td>
                </tr>
            </tfoot>
    </table>
</body>
</html>
