<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e8f0ff;
}

.card{
    width:360px;
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    position:relative;
}

.top-section{
    height:170px;
    background:#4b73e8;
}

.profile-image{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    width:130px;
    height:130px;
    border-radius:50%;
    border:5px solid white;
    overflow:hidden;
    background:#4b73e8;
}

.profile-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.content{
    padding-top:75px;
    padding-bottom:25px;
    text-align:center;
}

.content h2{
    font-size:30px;
    color:#222;
}

.content p{
    margin-top:8px;
    color:#666;
    font-size:18px;
}

.social-icons{
    margin:25px 0;
}

.social-icons a{
    width:42px;
    height:42px;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    color:white;
    text-decoration:none;
    margin:0 8px;
    font-size:18px;
}

.social-icons a:nth-child(1){
    background:#1877F2;
}

.social-icons a:nth-child(2){
    background:#1DA1F2;
}

.social-icons a:nth-child(3){
    background:#E1306C;
}

.social-icons a:nth-child(4){
    background:#FF0000;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.buttons button{
    border:none;
    outline:none;
    background:#4b73e8;
    color:white;
    padding:12px 30px;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.buttons button:hover{
    background:#355bd0;
}

.stats{
    display:flex;
    justify-content:center;
    align-items:center;
}

.stat{
    display:flex;
    align-items:center;
    gap:8px;
    color:#444;
    font-size:18px;
}

.divider{
    width:2px;
    height:22px;
    background:#ccc;
    margin:0 18px;
}
    </style>
</head>
<body>

<div class="card">

    <div class="top-section"></div>

    <div class="profile-image">
        <img src="/mypic.png" alt="Profile">
    </div>

    <div class="content">

        <h2>CodingLab</h2>
        <p>YouTuber & Blogger</p>

        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>

        <div class="buttons">
            <button>Subscribe</button>
            <button>Message</button>
        </div>

        <div class="stats">

            <div class="stat">
                <i class="far fa-heart"></i>
                <span>60.4k</span>
            </div>

            <div class="divider"></div>

            <div class="stat">
                <i class="far fa-comment"></i>
                <span>20k</span>
            </div>

            <div class="divider"></div>

            <div class="stat">
                <i class="fas fa-share right"></i>
                <span>12.4k</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
