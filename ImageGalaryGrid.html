<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image Galary</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    background: #f2f2f2;
    font-family: Arial, sans-serif;
}

section{
    padding: 30px;
}

#Container1{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.image-grid{
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.image-grid:hover{
    transform: scale(1.05);
}

.image-grid img{
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
}
    </style>
</head>
<body>
    <section>
        <div id="Container1">
            <div class="image-grid">
                <img src="/assets/ironman.png" alt="ironman">
            </div>
